<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Article - ModernBlog</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container nav">
            <a href="index.html" style="font-weight: 800; font-size: 1.5rem; text-decoration: none; color: var(--text-color);">MODERNBLOG</a>
            <button id="theme-toggle" class="btn-toggle">🌙 Mode</button>
        </div>
    </header>

    <article class="container">
        <header class="article-header">
            <span id="article-category" class="card-tag"></span>
            <h1 id="article-title" style="font-size: 3rem; margin-top: 10px;"></h1>
            <div class="article-meta">
                By <span id="article-author"></span> | <span id="article-date"></span> | <span id="article-readtime"></span>
            </div>

            <!-- AdSense Placeholder -->
            <div class="ad-slot">
                <!-- ADSENSE CODE HERE: Below Title -->
                <p>ADVERTISEMENT</p>
            </div>
        </header>

        <div class="article-body">
            <img id="article-banner" src="" alt="" style="margin-bottom: 30px;">
            <div id="article-content"></div>

            <!-- AdSense Placeholder -->
            <div class="ad-slot">
                <!-- ADSENSE CODE HERE: Middle of Article -->
                <p>ADVERTISEMENT</p>
            </div>

            <div class="share-buttons">
                <span>Share:</span>
                <a href="#" class="share-btn" onclick="window.open('https://twitter.com/share?url='+window.location.href)">Twitter</a>
                <a href="#" class="share-btn" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u='+window.location.href)">Facebook</a>
            </div>
        </div>
    </article>

    <section class="container" style="margin-top: 50px;">
        <hr>
        <h3>Related Articles</h3>
        <div class="article-grid" id="related-grid"></div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/blog.js"></script>
    <script>
        // Logic to load specific article
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            if (slug) {
                renderArticle(slug);
            }
        };
    </script>
</body>
</html>
